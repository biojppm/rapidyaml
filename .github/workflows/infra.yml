# DO NOT EDIT - GENERATED FROM .github/workflows/infra.ys

name: infra
defaults:
  run:
    shell: bash -e -x {0}
'on':
  workflow_dispatch: null
  push:
    branches:
    - master
  pull_request:
    branches:
    - '**'
env:
  PROJ_PKG_NAME: rapidyaml-
  PROJ_PFX_TARGET: ryml-
  PROJ_PFX_CMAKE: RYML_
  CMAKE_FLAGS: -DRYML_TEST_SUITE=ON
  NUM_JOBS_BUILD: null
jobs:
  check_workflows:
    if: always()
    continue-on-error: false
    runs-on: ubuntu-24.04
    steps:
    - name: checkout (action)
      uses: actions/checkout@v6
      with:
        submodules: recursive
        fetch-depth: 0
    - name: install ys
      run: make -C .github/workflows install-ys
    - name: generate workflows
      run: make -C .github/workflows build
    - name: test workflows
      run: |
        wc --version
        wc --help
        make -C .github/workflows test
        status=$?
        if [ $status != 0 ] ; then
          echo "ERROR: generated workflows are out of date"
        fi
        exit $status
  check_doc:
    if: always()
    continue-on-error: false
    runs-on: ubuntu-24.04
    env:
      DOXY_DIR: /tmp/doxydir
    steps:
    - name: checkout (action)
      uses: actions/checkout@v6
      with:
        submodules: recursive
        fetch-depth: 0
    - name: Install python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    - name: install requirements
      run: pip install -r doc/requirements.txt
    - name: install wget
      run: |
        sudo apt-get update
        sudo apt install -y wget
    - name: install doxygen
      run: |
        set -xe
        make -C doc doxy_install DOXY_FORCE_VER=1 DOXY_DIR=$DOXY_DIR
        export PATH=$DOXY_DIR/bin:$PATH
        which doxygen
        doxygen --version
    - name: test doxygen docs
      run: |
        set -xe
        export PATH=$DOXY_DIR/bin:$PATH
        which doxygen
        doxygen --version
        make -C doc doxy_test DOXY_FORCE_VER=1 DOXY_DIR=$DOXY_DIR
    - name: test sphinx
      run: |
        set -xe
        export PATH=$DOXY_DIR/bin:$PATH
        which doxygen
        doxygen --version
        make -C doc html DOXY_FORCE_VER=1 DOXY_DIR=$DOXY_DIR
